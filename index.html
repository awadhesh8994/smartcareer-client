<!DOCTYPE html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="CareerAI — AI-powered career guidance for students and professionals across all fields." />
    <meta name="theme-color" content="#0F4C81" />

    <!-- Prevent flash of light mode — read persisted theme before React loads -->
    <script>
      try {
        const stored = localStorage.getItem('career-theme')
        const isDark = stored ? JSON.parse(stored)?.state?.isDark : true
        if (isDark !== false) document.documentElement.classList.add('dark')
        else document.documentElement.classList.remove('dark')
      } catch {
        document.documentElement.classList.add('dark')
      }
    </script>

    <!-- Google Fonts: Plus Jakarta Sans + Syne + JetBrains Mono -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Syne:wght@600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />

    <title>CareerAI — Smart Career Platform</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
